name: triton_explorer
description: Internal exploration UI for the Triton agent-ingress gateway.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.12.0
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  dio: ^5.7.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  # OIDC PKCE for Flutter web (and mobile). flutter_appauth is
  # mobile-only; `oidc` runs in browsers where the explorer lives.
  oidc: ^0.13.0
  oidc_default_store: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

# pubspec.lock is gitignored, so CI re-resolves transitive deps on every run.
# sembast 3.8.9 added `DatabaseFactory.pathContext`: the transitive
# `simple_secure_storage_web` 0.2.3 (via oidc_default_store) doesn't implement
# it, while `idb_shim`/`sembast_web` at their newest *require* it — the two
# sides are mutually incompatible at HEAD, and the release dart2js build fails.
# Pin the whole sembast family below the breaking change (the set that resolves
# locally) until the upstream catches up.
dependency_overrides:
  sembast: ">=3.0.0 <3.8.9"
  sembast_web: "<2.4.5"
  idb_shim: "<2.9.5"

flutter:
  uses-material-design: true
