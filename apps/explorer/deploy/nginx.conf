# nginx config for the Triton Explorer SPA.
#
# Tailnet-only deployment: this container listens on :8080 inside the
# Nomad alloc; Consul registers `dz-triton-explorer.service.consul`
# without any `urlprefix-` tag, so Fabio cannot reach it. Other
# tailnet peers (operators on tag:ops) browse it via the Consul DNS
# name.
#
# CORS is handled on Triton's side (see PR #16 — tower-http CorsLayer
# allow-lists the explorer's origin). This server only serves static
# Flutter web assets and the healthcheck.

server {
    listen 8080 default_server;
    server_name _;

    # SPA fallback: anything not on disk goes to /index.html so the
    # Flutter Navigator handles routing.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /healthz is what the Nomad service check pings.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # /version.json is rendered by Nomad's template stanza at deploy
    # time so the Dashboard footer can show the deployed Nomad job
    # version. Falls through to the SPA fallback when missing in dev.
    location = /version.json {
        try_files /version.json =404;
        add_header Cache-Control 'no-cache';
    }
}
