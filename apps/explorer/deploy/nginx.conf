# nginx config for the Triton Explorer SPA.
#
# Plain HTTP on :8080 — TLS is terminated upstream by `fabio-internal`
# (ADR-0010, substrate-platform reference 15). The per-env wildcard cert
# `*.<env>.int.data-zoo.de` is shared across every internal app; this
# container speaks plain HTTP behind it.
#
# CORS is enforced on Triton's side (TRITON_CORS_ALLOWED_ORIGINS allowlist).
# This server only serves static Flutter web assets, /healthz, and
# /version.json (rendered into /local by Nomad's template stanza).

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: anything not on disk goes to /index.html so the
    # Flutter Navigator handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /healthz is what the Nomad service check pings (10s interval).
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # /version.json is rendered into /local/version.json by Nomad's
    # template stanza so the SPA's Dashboard footer can read it. The
    # `alias` resolves to the Nomad-mounted task-local dir inside the
    # container; falls back 404 in `docker run` smoke tests where the
    # file isn't present.
    location = /version.json {
        alias /local/version.json;
        default_type application/json;
        add_header Cache-Control 'no-cache';
    }
}
