name: build-dz-triton-explorer

# Self-contained image build for the Triton Explorer Flutter SPA →
# ghcr.io/datazoode/dz-triton-explorer (GAR retired, Phase 5). Multi-stage
# Flutter web build → nginx (apps/explorer/deploy/Dockerfile). Same ghcr
# pattern as build-dz-triton.yml. We do NOT open the manifest-bump PR;
# `/release-app dz-triton-explorer <env>` resolves the latest :main SHA and
# opens it against the substrate repo.

on:
  push:
    branches: [main]
    paths:
      - "apps/explorer/**"
      - ".github/workflows/build-dz-triton-explorer.yml"
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-dz-triton-explorer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write # push the image to ghcr.io (GAR retired, Phase 5)
  contents: read

jobs:
  build:
    name: build + push dz-triton-explorer
    runs-on: ubuntu-latest
    # flutter pub get + flutter build web --release; 45m is ample margin.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          GHCR="ghcr.io/datazoode/dz-triton-explorer"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${GHCR}:${SHORT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${GHCR}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${GHCR}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/explorer/deploy/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
