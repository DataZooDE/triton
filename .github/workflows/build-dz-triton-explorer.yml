name: build-dz-triton-explorer

# Self-contained image build for the Triton Explorer Flutter SPA → GAR
# substrate/dz-triton-explorer. Multi-stage Flutter web build → nginx
# (apps/explorer/deploy/Dockerfile). Same WIF pattern as build-dz-triton.yml.
# We do NOT open the manifest-bump PR; `/release-app dz-triton-explorer <env>`
# resolves the latest :main SHA and opens it against the substrate repo.
#
# Operator prerequisites (one-time): see build-dz-triton.yml — DataZooDE/triton
# must be trusted by the bootstrap WIF binding, and the GCP_* Actions vars set.

on:
  push:
    branches: [main]
    paths:
      - "apps/explorer/**"
      - ".github/workflows/build-dz-triton-explorer.yml"
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-dz-triton-explorer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # WIF auth to GCP
  contents: read

jobs:
  build:
    name: build + push dz-triton-explorer
    runs-on: ubuntu-latest
    # flutter pub get + flutter build web --release; 45m is ample margin.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          GAR="europe-west3-docker.pkg.dev/hetzner-agent-backplane/substrate/dz-triton-explorer"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${GAR}:${SHORT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${GAR}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${GAR}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/explorer/deploy/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
