name: build-dz-triton-gateway

# Re-label the dz-triton image as dz-triton-gateway → ghcr.io/datazoode/
# dz-triton-gateway. Same binary + baked WhatsApp manifest; only the Kamal
# `service` label differs so the substrate's dz-triton-gateway service accepts
# it. Rebuild after dz-triton:main changes (it FROMs that tag).
on:
  push:
    branches: [main]
    paths:
      - "deploy/triton-gateway/Dockerfile"
      - ".github/workflows/build-dz-triton-gateway.yml"
  workflow_dispatch:

concurrency:
  group: build-dz-triton-gateway-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: build + push dz-triton-gateway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          GHCR="ghcr.io/datazoode/dz-triton-gateway"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${GHCR}:${SHORT}"
          [ "${GITHUB_REF}" = "refs/heads/main" ] && TAGS="${TAGS},${GHCR}:main"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${TAGS}"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/triton-gateway/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
