name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs so a quick succession of pushes to a PR
# doesn't queue up an obsolete green.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo fmt + clippy + test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pinned to the workspace's rust-version (Cargo.toml).
      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --profile minimal --component rustfmt,clippy
          rustup default 1.95

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: cargo test --workspace
        env:
          RUST_BACKTRACE: 1
        run: cargo test --workspace --locked

  flutter:
    name: flutter analyze + test + build web (apps/explorer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/explorer
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: flutter build web --release
        run: flutter build web --release
