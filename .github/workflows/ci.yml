name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs so a quick succession of pushes to a PR
# doesn't queue up an obsolete green.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo fmt + clippy + test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # CI reliability (see doc/realizations.md §7): cap peak build memory
      # so a parallel-link spike across the workspace's test binaries can't
      # OOM and lose the runner mid-job.
      #   * Incremental compilation gains nothing on an ephemeral runner and
      #     bloats `target` + memory — turn it off.
      #   * Bound build parallelism so at most 2 heavy links run at once
      #     (the public runner has 4 cores / 16 GB; 4 concurrent debug links
      #     were the spike). Combined with the slimmed dev debuginfo profile
      #     and the consolidated `triton-tests` binary, this keeps the link
      #     phase comfortably under the memory ceiling.
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@v4

      # Pinned to the workspace's rust-version (Cargo.toml).
      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --profile minimal --component rustfmt,clippy
          rustup default 1.95

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      # Integration tests in `triton-tests` spawn real binaries
      # (`triton` for the gateway; `triton-rasterizer` for the
      # PNG sidecar). `cargo test --workspace` builds the test
      # crates but does NOT build separate workspace binaries by
      # default, so without these explicit builds the spawn-based
      # tests panic with "could not locate `<name>` binary".
      - name: cargo build --bins
        run: cargo build --locked --bin triton --bin triton-rasterizer

      - name: cargo test --workspace
        env:
          RUST_BACKTRACE: 1
        run: cargo test --workspace --locked

      # The dev-only `capture` feature (Explorer Trace view) is off in the
      # default build, so the line above never exercises it. Run the embed
      # trio tests with it enabled so the capture middleware — including
      # the TS-04 "must not buffer SSE" guard — stays green.
      - name: cargo test (capture feature)
        env:
          RUST_BACKTRACE: 1
        run: cargo test --locked -p triton-embed --features capture

      # ACC-13 — exercise the external-consumer smoke as a
      # SEPARATE Cargo workspace so the harness's `pub` surface
      # stays consumable from non-workspace crates. The example
      # at `examples/consumer-smoke` declares its own
      # `[workspace]` and pulls `triton-tests` in as a path
      # dependency. This step would catch a refactor that
      # silently moves a fixture into `pub(crate)` visibility.
      - name: cargo test (external consumer smoke)
        env:
          RUST_BACKTRACE: 1
        working-directory: examples/consumer-smoke
        run: cargo test --locked

  flutter:
    name: flutter analyze + test + build web (apps/explorer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/explorer
    steps:
      - uses: actions/checkout@v4

      # The release `dart2js` compile of a CanvasKit app peaks above the
      # runner's RAM and gets OOM-killed early (abnormal exit, no diagnostic;
      # the same toolchain builds fine on a higher-RAM machine). Add swap so it
      # can spill instead of dying.
      - name: Add swap space
        working-directory: /
        run: |
          # The runner already ships a small /swapfile — replace it with a
          # bigger one so dart2js can spill.
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 14G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin the version: a floating `stable` regressed the release
          # `dart2js` web build (it crashed ~14s in, no diagnostic, while the
          # pinned toolchain compiles cleanly). Bump deliberately.
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: flutter build web --release
        # `--no-wasm-dry-run` skips the extra wasm compile the toolchain runs
        # alongside dart2js; we don't ship --wasm, and the double compile
        # spikes peak memory enough to OOM-kill dart2js on the CI runner.
        run: flutter build web --release --no-wasm-dry-run
