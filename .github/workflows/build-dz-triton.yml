name: build-dz-triton

# Self-contained image build for the Triton agent-ingress gateway →
# ghcr.io/datazoode/dz-triton (GAR retired, Phase 5). Built here (not the
# substrate's reusable build-app-image.yml) because that workflow's cross-repo
# reuse is disabled (access=none); this mirrors DataZooDE/datazoo-agent-template's
# build-agent-template.yml. We do NOT open the manifest-bump PR (cross-repo
# write); `/release-app dz-triton-api <env>` resolves the latest :main SHA
# from ghcr and opens the manifest PR against the substrate repo.
#
# No operator prerequisites: GITHUB_TOKEN has packages:write on the org's
# ghcr namespace — no WIF, no static cloud keys, no GAR→ghcr mirror.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deploy/triton/Dockerfile"
      - ".github/workflows/build-dz-triton.yml"
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-dz-triton-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write # push the image to ghcr.io (GAR retired, Phase 5)
  contents: read

jobs:
  build:
    name: build + push dz-triton
    runs-on: ubuntu-latest
    # cargo build --release -p triton-bin from scratch; 60m gives margin.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          GHCR="ghcr.io/datazoode/dz-triton"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${GHCR}:${SHORT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${GHCR}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${GHCR}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/triton/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
