# adapter.yaml fragment — hand this to the Triton operator.
#
# This is NOT a standalone file you deploy. It is the slice of the
# deployment's adapter.yaml that registers YOUR tool (and, if your
# tool's surface targets chat channels, the degrade rules for it).
# The operator merges it into the live manifest. See references/03,
# references/05, and deploy/triton/adapter.yaml in the Triton repo for
# a real example.
#
# Two ownership zones:
#   - `tools:`     → you drive the content (what your tool emits).
#   - `adapters:`  → operator territory; shown here so you understand
#                    what degrade rules your surface_components imply.

version: "0.2"

# ── YOU drive this ───────────────────────────────────────────────
tools:
  # EDIT: your tool name. It must match the path the frontend calls
  # (/v1/tools/<name>) and the key the operator gives your agent in
  # TRITON_STATIC_UPSTREAMS=<name>=<host:port> — there is no Consul
  # tag any more; discovery is a static name→endpoint map.
  my-tool:
    # Declare EXACTLY the component kinds your tool can emit. Triton
    # closed-checks at boot that every chat adapter has a degrade rule
    # for each of these (FR-L-5, M-COVERAGE-1) — over-declaring forces
    # the operator to add rules you don't need; under-declaring makes
    # a real surface get rejected at render time.
    # Full vocabulary: text, narration, buttons, selections, forms,
    # dashboard, sources (click-to-open document references), report
    # (inline chart) — see references/02.
    surface_components: [text, narration, buttons]

  # A raw-JSON tool with no UI declares an empty surface.
  my-raw-tool:
    surface_components: []

# ── OPERATOR territory (shown for context) ───────────────────────
# If your tool's surface reaches chat channels, every adapter needs a
# degrade rule per component type you declared above. Credentials MUST
# be `env://VARNAME` refs in production — a literal here makes prod boot
# fail (M-SECRETS-1). Vault is decommissioned; the named env vars are
# injected from GCP Secret Manager via kamal `.kamal/secrets` (see
# substrate-platform). This Telegram example covers text+narration+buttons.
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: env://TRITON_TELEGRAM_SECRET_TOKEN
    outbound:
      kind: rest_api
      token: env://TRITON_TELEGRAM_BOT_TOKEN
    identity:
      kind: sender_table
      table: env://TRITON_TELEGRAM_SENDER_TABLE
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard       # Telegram native; ≤ 8 buttons/row
      # Add a rule for EVERY component kind any tool declares, e.g.:
      # selections: inline_keyboard
      # forms: numbered_prompts
      # dashboard: rasterised_png    # requires a configured rasteriser
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: env://TRITON_TELEGRAM_CORRELATION_KEY

# ── OPTIONAL: agent-resolved sender identity (FR-I-7) ─────────────
# Instead of an operator-curated `sender_table`, an adapter can delegate
# sender resolution to one of YOUR tools via `identity.kind: upstream`.
# Triton calls `resolver_tool` with {platform, sender} BEFORE the command
# dispatch and expects {sub, scopes, tenant} back; a non-2xx / empty
# reply rejects the inbound 401. `tool:` is the command tool a plain
# message dispatches. See references/01 §upstream and
# doc/upstream-agent-contract.md §5.
#
#  whatsapp:
#    kind: whatsapp_cloud
#    tool: my-tool
#    inbound:
#      kind: webhook
#      signature: hmac256
#      secret: env://TRITON_WHATSAPP_APP_SECRET
#      verify_token: env://TRITON_WHATSAPP_VERIFY_TOKEN
