# PR 16 integration manifest. Every secret is a Vault KV v2 ref —
# the resolver is what makes this manifest serviceable. The fake
# Vault test fixture serves `kv/data/triton-test/telegram` with the
# four fields below. PR 13's literal-only `manifest-telegram-test`
# fixture stays around for the inbound-only tests; this one is the
# vault-resolved variant.
version: "0.2"

adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: vault://kv/data/triton-test/telegram#webhook_secret
    outbound:
      kind: rest_api
      token: vault://kv/data/triton-test/telegram#bot_token
    identity:
      kind: sender_table
      table: vault://kv/data/triton-test/telegram#senders
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: vault://kv/data/triton-test/telegram#correlation_key

tools:
  echo:
    surface_components: []
