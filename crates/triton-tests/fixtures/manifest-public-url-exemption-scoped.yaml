# #191 Codex review finding: the `public_url` M-SECRETS-1 exemption must
# be scoped to `AdapterKind::TwilioWhatsapp` — otherwise ANY adapter can
# smuggle a literal credential under a field it invents named
# `inbound.public_url` and dodge the production literal-secret check.
# This is a non-Twilio adapter (`telegram`) declaring that field; a
# production manifest carrying it MUST still be refused.
version: "0.2"
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: vault://kv/x#t
      public_url: this-is-a-smuggled-literal-secret
    outbound:
      kind: rest_api
      token: vault://kv/x#t
    identity:
      kind: sender_table
      table: vault://kv/x#senders
    degrade: { text: passthrough }
    rate_limit: { messages_per_sec: 1, burst: 1 }
    correlation_key: vault://kv/x#k
tools: {}
