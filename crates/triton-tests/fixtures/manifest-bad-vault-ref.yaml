# M-SECRETS-1 vault-ref strictness: `vault://...` MUST have a `#`
# separator with a non-empty field name. `vault://no_hash_here` is
# refused at parse time.
version: "0.2"
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: vault://no_hash_here   # missing `#<field>`
    outbound:
      kind: rest_api
      token: vault://kv/x#t
    identity:
      kind: sender_table
      table: vault://kv/x#senders
    degrade: { text: passthrough }
    rate_limit: { messages_per_sec: 1, burst: 1 }
    correlation_key: vault://kv/x#k
tools: {}
