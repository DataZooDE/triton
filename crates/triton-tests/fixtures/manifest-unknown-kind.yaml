# M-MANIFEST-1: unknown `inbound.kind` value MUST refuse boot.
version: "0.2"
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: smoke_signal     # NOT in the closed set {webhook, socket, long_poll}
      signature: secret_token
      secret: vault://kv/x#s
    outbound:
      kind: rest_api
      token: vault://kv/x#t
    identity:
      kind: sender_table
      table: vault://kv/x#senders
    degrade: { text: passthrough }
    rate_limit: { messages_per_sec: 1, burst: 1 }
    correlation_key: vault://kv/x#k
tools: {}
