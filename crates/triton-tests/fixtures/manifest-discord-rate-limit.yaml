# Same shape as `manifest-discord-test.yaml` but with a tiny
# rate_limit so the integration test can drive the bucket empty.
version: "0.2"

adapters:
  discord:
    kind: discord
    inbound:
      kind: webhook
      signature: ed25519
      public_key: env://TRITON_DISCORD_PUBLIC_KEY
    outbound:
      kind: rest_api
      token: env://TRITON_DISCORD_BOT_TOKEN
    identity:
      kind: sender_table
      table: env://TRITON_DISCORD_SENDERS
    degrade:
      text: passthrough
      narration: passthrough
      buttons: components_v2
      selections: components_v2
      forms: components_v2
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 1
      burst: 2
    correlation_key: env://TRITON_DISCORD_CORRELATION_KEY

tools:
  echo:
    surface_components: []
  narrate:
    surface_components: [text, narration, buttons]
