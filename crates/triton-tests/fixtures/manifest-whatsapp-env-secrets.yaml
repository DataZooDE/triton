# env:// secret refs. The substrate decommissioned Vault, so manifest
# credentials resolve from the CONTAINER ENVIRONMENT (GCP Secret Manager →
# kamal `.kamal/secrets` → env). This manifest boots in nonprod, where
# inline literals are refused (M-SECRETS-1) — every credential is an
# `env://VARNAME` ref the EnvResolver materialises at boot.
version: "0.2"

adapters:
  whatsapp:
    kind: whatsapp_cloud
    inbound:
      kind: webhook
      signature: hmac256
      secret: env://TRITON_WA_APP_SECRET
      verify_token: env://TRITON_WA_VERIFY_TOKEN
    outbound:
      kind: rest_api
      token: env://TRITON_WA_ACCESS_TOKEN
      phone_number_id: env://TRITON_WA_PHONE_NUMBER_ID
    identity:
      kind: sender_table
      table: env://TRITON_WA_SENDER_TABLE
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: env://TRITON_WA_CORRELATION_KEY

tools:
  echo:
    surface_components: []
