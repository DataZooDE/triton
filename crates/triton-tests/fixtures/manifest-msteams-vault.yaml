# PR 37 NFR-S-4 fix-up: msteams manifest whose credentials are all
# `vault://` refs so the manifest validates in `production` env. The
# integration test only exercises boot-time settings rejection — the
# binary refuses the env var BEFORE any credential resolution, so the
# fake Vault behind the refs is never actually contacted. The refs
# only exist to satisfy `M-SECRETS-1`.
version: "0.2"

adapters:
  msteams:
    kind: ms_teams
    inbound:
      kind: webhook
      signature: bot_framework_jwt
      audience: vault://kv/data/triton-test/msteams#audience
    outbound:
      kind: bot_connector
      client_id: vault://kv/data/triton-test/msteams#client_id
      client_secret: vault://kv/data/triton-test/msteams#client_secret
    identity:
      kind: sender_table
      table: vault://kv/data/triton-test/msteams#sender_table
    degrade:
      text: passthrough
      narration: passthrough
      buttons: adaptive_card
      selections: adaptive_card
      forms: adaptive_card
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: vault://kv/data/triton-test/msteams#correlation_key

tools:
  echo:
    surface_components: []
