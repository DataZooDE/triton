# PR 37 NFR-S-4 fix-up: msteams manifest whose credentials are all
# `env://` refs so the manifest validates in `production` env. The
# integration test only exercises boot-time settings rejection — the
# binary refuses the env var BEFORE any credential resolution, so the
# refs are never actually resolved. They only exist to satisfy
# `M-SECRETS-1`.
version: "0.2"

adapters:
  msteams:
    kind: ms_teams
    inbound:
      kind: webhook
      signature: bot_framework_jwt
      audience: env://TRITON_MSTEAMS_AUDIENCE
    outbound:
      kind: bot_connector
      client_id: env://TRITON_MSTEAMS_CLIENT_ID
      client_secret: env://TRITON_MSTEAMS_CLIENT_SECRET
    identity:
      kind: sender_table
      table: env://TRITON_MSTEAMS_SENDER_TABLE
    degrade:
      text: passthrough
      narration: passthrough
      buttons: adaptive_card
      selections: adaptive_card
      forms: adaptive_card
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: env://TRITON_MSTEAMS_CORRELATION_KEY

tools:
  echo:
    surface_components: []
