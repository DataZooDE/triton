# M-SECRETS-1 / FR-L-6 / NFR-S-5: literal credential (no
# `vault://` prefix) is admitted in dev mode with a warning but
# MUST refuse production boot.
version: "0.2"
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: literally-a-secret-string   # NO vault:// prefix
    outbound:
      kind: rest_api
      token: vault://kv/x#t
    identity:
      kind: sender_table
      table: vault://kv/x#senders
    degrade: { text: passthrough }
    rate_limit: { messages_per_sec: 1, burst: 1 }
    correlation_key: vault://kv/x#k
tools: {}
