# PR 38 integration manifest. Same shape as manifest-discord-test.yaml
# but declares the `demo_panel` tool (whose Surface includes a
# `Component::Dashboard`) so the integration test can drive the
# rasterizer wiring end-to-end.
version: "0.2"

adapters:
  discord:
    kind: discord
    inbound:
      kind: webhook
      signature: ed25519
      public_key: env://TRITON_DISCORD_PUBLIC_KEY
    outbound:
      kind: rest_api
      token: env://TRITON_DISCORD_BOT_TOKEN
    identity:
      kind: sender_table
      table: env://TRITON_DISCORD_SENDERS
    degrade:
      text: passthrough
      narration: passthrough
      buttons: components_v2
      selections: components_v2
      forms: components_v2
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 50
      burst: 100
    correlation_key: env://TRITON_DISCORD_CORRELATION_KEY

tools:
  echo:
    surface_components: []
  narrate:
    surface_components: [text, narration, buttons]
  demo_panel:
    # Covers every component the demo tool emits; ensures the
    # manifest's `degrade` table is complete (M-COVERAGE-1).
    surface_components: [text, narration, buttons, selections, forms, dashboard]
