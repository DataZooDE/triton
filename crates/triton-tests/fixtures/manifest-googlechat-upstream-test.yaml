# upstream-resolver Google Chat adapter (FR-I-7). Identity is
# delegated to a resolver tool reached through the upstream router:
# the adapter calls `resolver_tool` with the platform sender id and
# the tool returns {sub, scopes, tenant}. The resolver agent is
# reached via the static upstream map (`TRITON_STATIC_UPSTREAMS`) and
# gets a per-call RS256 JWT.
version: "0.2"

adapters:
  google_chat:
    kind: google_chat
    inbound:
      kind: webhook
      signature: google_oidc_jwt
      audience: "1234567890"
    outbound:
      kind: rest_api
      token: unused-in-pr-33
    identity:
      kind: upstream
      # The `resolve_identity` static-upstream agent answers the resolve.
      resolver_tool: resolve_identity
    degrade:
      text: passthrough
      narration: passthrough
      buttons: card_v2
      selections: card_v2
      forms: card_v2
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: correlation-key-for-test

tools:
  echo:
    surface_components: []
