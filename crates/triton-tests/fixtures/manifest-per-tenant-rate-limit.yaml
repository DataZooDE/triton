# PR 28 integration manifest. Two senders mapped to two distinct
# tenants. Adapter rate_limit (per-tenant) is 1/sec burst 2; the
# adapter-wide bucket is sized 10x to give per-tenant separation
# room. The test sends 4 messages from each tenant in succession
# and confirms neither blocks the other.
version: "0.2"

adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: webhook-secret-for-test
    outbound:
      kind: rest_api
      token: bot-token-for-test
    identity:
      kind: sender_table
      table: '{"42":{"sub":"alice","scopes":["chat"],"tenant":"alpha"},"43":{"sub":"bob","scopes":["chat"],"tenant":"beta"}}'
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 1
      burst: 2
    correlation_key: correlation-key-for-test

tools:
  echo:
    surface_components: []
