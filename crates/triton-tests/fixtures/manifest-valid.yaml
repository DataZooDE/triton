# Minimal but realistic v0.2 adapter manifest. Two chat-channel
# adapters (Telegram webhook + Discord interactions) and one tool
# whose surface includes a button — exercises every closed-set
# discriminator and the M-COVERAGE-1 / M-SECRETS-1 checks.
version: "0.2"

adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: env://TRITON_TG_WEBHOOK_SECRET
    outbound:
      kind: rest_api
      token: env://TRITON_TG_BOT_TOKEN
    identity:
      kind: sender_table
      table: env://TRITON_TG_SENDERS
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: env://TRITON_TG_CORRELATION_KEY

  discord:
    kind: discord
    inbound:
      kind: webhook
      signature: ed25519
      public_key: env://TRITON_DISCORD_PUBLIC_KEY
    outbound:
      kind: rest_api
      token: env://TRITON_DISCORD_BOT_TOKEN
    identity:
      kind: sender_table
      table: env://TRITON_DISCORD_SENDERS
    degrade:
      text: passthrough
      narration: passthrough
      buttons: components_v2
      selections: components_v2
      forms: components_v2
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 50
      burst: 100
    correlation_key: env://TRITON_DISCORD_CORRELATION_KEY

tools:
  narrate:
    surface_components: [text, narration, buttons]
  echo:
    surface_components: []
