# Minimal but realistic v0.2 adapter manifest. Two chat-channel
# adapters (Telegram webhook + Discord interactions) and one tool
# whose surface includes a button — exercises every closed-set
# discriminator and the M-COVERAGE-1 / M-SECRETS-1 checks.
version: "0.2"

adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: secret_token
      secret: vault://kv/data/apps/dz/triton/nonprod/telegram#webhook_secret
    outbound:
      kind: rest_api
      token: vault://kv/data/apps/dz/triton/nonprod/telegram#bot_token
    identity:
      kind: sender_table
      table: vault://kv/data/apps/dz/triton/nonprod/telegram#senders
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: vault://kv/data/apps/dz/triton/nonprod/telegram#correlation_key

  discord:
    kind: discord
    inbound:
      kind: webhook
      signature: ed25519
      public_key: vault://kv/data/apps/dz/triton/nonprod/discord#public_key
    outbound:
      kind: rest_api
      token: vault://kv/data/apps/dz/triton/nonprod/discord#bot_token
    identity:
      kind: sender_table
      table: vault://kv/data/apps/dz/triton/nonprod/discord#senders
    degrade:
      text: passthrough
      narration: passthrough
      buttons: components_v2
      selections: components_v2
      forms: components_v2
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 50
      burst: 100
    correlation_key: vault://kv/data/apps/dz/triton/nonprod/discord#correlation_key

tools:
  narrate:
    surface_components: [text, narration, buttons]
  echo:
    surface_components: []
