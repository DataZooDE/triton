# #191 PR-T6 — Twilio-WhatsApp delivery-receipt status callback.
# `status_callback_public_url` is optional: when absent, no StatusCallback
# param is attached to outbound sends and no /status route is mounted
# (PR-T2 behaviour, unchanged). When present, both activate.
version: "0.2"

adapters:
  twilio-whatsapp:
    kind: twilio_whatsapp
    tool: echo
    inbound:
      kind: webhook
      signature: twilio_signature
      secret: twilio-auth-token-for-test
      public_url: env://TRITON_TWILIO_WHATSAPP_PUBLIC_URL
      status_callback_public_url: env://TRITON_TWILIO_WHATSAPP_STATUS_CALLBACK_URL
    outbound:
      kind: rest_api
      account_sid: ACtest00000000000000000000000000
      token: twilio-auth-token-for-test
      from: "whatsapp:+14155238886"
    identity:
      kind: sender_table
      table: '{"+491701234567":{"sub":"alice","scopes":["chat"],"tenant":"acme"}}'
    degrade:
      text: passthrough
      narration: passthrough
    rate_limit:
      messages_per_sec: 6
      burst: 2
    correlation_key: twilio-whatsapp-correlation-key-unused

tools:
  echo:
    surface_components: []
