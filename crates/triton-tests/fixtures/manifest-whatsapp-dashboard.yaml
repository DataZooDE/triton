# PR 38 integration manifest. Same shape as manifest-whatsapp-test.yaml
# but declares `demo_panel` so the test can exercise the rasterizer
# wiring through a Dashboard-emitting tool.
version: "0.2"

adapters:
  whatsapp:
    kind: whatsapp_cloud
    inbound:
      kind: webhook
      signature: hmac256
      secret: whatsapp-app-secret-for-test
      verify_token: meta-verify-token-for-test
    outbound:
      kind: rest_api
      token: whatsapp-access-token-for-test
      phone_number_id: "100200300"
    identity:
      kind: sender_table
      table: '{"491701234567":{"sub":"alice","scopes":["chat"],"tenant":"acme"}}'
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: whatsapp-correlation-key-for-test

tools:
  echo:
    surface_components: []
  demo_panel:
    surface_components: [text, narration, buttons, selections, forms, dashboard]
