# PR 31 integration manifest. Single WhatsApp Cloud API adapter with
# literal credentials (dev mode only). The sender_table is JSON-encoded
# inline so tests don't need a Vault server. `verify_token` is the
# webhook subscription handshake token; `secret` is the app secret used
# for HMAC-SHA256 over the inbound body.
version: "0.2"

adapters:
  whatsapp:
    kind: whatsapp_cloud
    inbound:
      kind: webhook
      signature: hmac256
      secret: whatsapp-app-secret-for-test
      verify_token: meta-verify-token-for-test
    outbound:
      kind: rest_api
      token: whatsapp-access-token-for-test
      phone_number_id: "100200300"
    identity:
      kind: sender_table
      # JSON: maps WhatsApp wa_id (E.164 without leading +) to claims.
      table: '{"491701234567":{"sub":"alice","scopes":["chat"],"tenant":"acme"}}'
    degrade:
      text: passthrough
      narration: passthrough
      buttons: inline_keyboard
      selections: inline_keyboard
      forms: numbered_prompts
      dashboard: rasterised_png
    rate_limit:
      messages_per_sec: 25
      burst: 50
    correlation_key: whatsapp-correlation-key-for-test

tools:
  echo:
    surface_components: []
