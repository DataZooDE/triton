# #191: `signature: twilio_signature` with its required `secret`
# (the Twilio Auth Token) present — a well-formed closed-set entry.
# `kind: telegram` is a placeholder; `AdapterKind::TwilioWhatsapp` lands
# in a follow-up PR once the adapter crate exists. This fixture only
# proves the manifest layer accepts the scheme + its credential.
version: "0.2"
adapters:
  telegram:
    kind: telegram
    inbound:
      kind: webhook
      signature: twilio_signature
      secret: vault://kv/x#auth_token
    outbound:
      kind: rest_api
      token: vault://kv/x#t
    identity:
      kind: sender_table
      table: vault://kv/x#senders
    degrade: { text: passthrough }
    rate_limit: { messages_per_sec: 1, burst: 1 }
    correlation_key: vault://kv/x#k
tools: {}
