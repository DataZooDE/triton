[package]
name = "triton-tests"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
tokio = { workspace = true }
reqwest = { workspace = true }
serde_json = { workspace = true }
libc = "0.2"
triton-manifest = { path = "../triton-manifest" }
triton-correlation = { path = "../triton-correlation" }

# Real OIDC fixture: Ed25519 keypair + JWT sign + tiny axum issuer
# serving discovery + JWKS. No mocks per CLAUDE.md §1.
axum = { workspace = true }
base64 = "0.22"
ed25519-dalek = { version = "2", features = ["pkcs8", "pem", "rand_core"] }
getrandom = "0.2"
jsonwebtoken = "9"
serde = { workspace = true }
